<a href="https://sokky.netlify.app"><i class="fa fa-home"></i> Home</a> <!-- Fixed home link -->
<form class="search-box" id="searchForm">
  <input type="text" name="from" placeholder="From" required>
  <input type="text" name="to" placeholder="To" required>
  <div class="date-wrapper">
      <i class="fa-regular fa-calendar"></i>
      <input type="date" name="date">
  </div>
  <button type="submit">Search</button>
</form>
<script>
  const form = document.getElementById('searchForm');
  form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const from = form.from.value;
      const to = form.to.value;
      const date = form.date.value;

      const url = `https://sokky-backend-school-project.onrender.com/api/buses?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}${date ? "&date=" + encodeURIComponent(date) : ""}`;

      try {
          const res = await fetch(url);
          const data = await res.json();
          // Save search parameters in query string and redirect to search.html
          window.location.href = `search.html?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&date=${encodeURIComponent(date)}`;
      } catch (err) {
          alert("Error fetching buses. Check console.");
          console.error(err);
      }
  });
</script>
