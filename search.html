<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUS SEARCH RESULTS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; scroll-behavior:smooth; }
body { background:#f8f9ff; color:#333; min-height:100vh; }
nav { display:flex; justify-content:space-between; align-items:center; padding:20px 60px; background:#4b0082; position:fixed; top:0; width:100%; z-index:1000; }
nav h2 { color:white; font-weight:700; }
nav a { text-decoration:none; color:white; margin-left:25px; font-weight:500; transition:0.3s; }
nav a:hover { color:#ffd6ff; }
main { padding-top:120px; padding-left:60px; padding-right:60px; }
h1 { color:#4b0082; margin-bottom:20px; text-align:center; }
#results { max-width:1200px; overflow-x:auto; margin-bottom:30px; }
#results table { width:100%; border-collapse:collapse; background:white; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
#results th, #results td { padding:12px 15px; border:1px solid #ddd; text-align:left; vertical-align:top; }
#results th { background:#4b0082; color:white; }
#results tbody tr:nth-child(even) { background:#f2f2f2; }
#analytics { max-width:1200px; padding:20px; background:white; box-shadow:0 5px 15px rgba(0,0,0,0.1); margin-bottom:50px; }
#analytics h2 { color:#4b0082; margin-bottom:15px; }
.analytics-item { margin-bottom:10px; font-weight:500; }
@media(max-width:768px){ main { padding-left:20px; padding-right:20px; } }
footer{ background:#4b0082; color:white; padding:50px; }
.footer-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:40px; }
footer a{ display:block; text-decoration:none; color:#ddd; margin-bottom:8px; }
footer a:hover{ color:white; }
</style>
</head>
<body>

<nav>
  <h2>BUS VIEW</h2>
  <div><a href="https://sokky.netlify.app/"><i class="fa fa-home"></i> Home</a>
    <a href="#results">Buses</a>
    <a href="#analytics">Analytics</a>
  </div>
</nav>

<main>
  <h1>Search Results</h1>
  <div id="results"></div>

  <div id="analytics">
    <h2>Analytics</h2>
    <div class="analytics-item" id="cheapest">Cheapest bus: -</div>
    <div class="analytics-item" id="expensive">Most expensive bus: -</div>
    <div class="analytics-item" id="mostSeats">Bus with most seats: -</div>
  </div>
</main>

<!-- Load search.js directly from Render backend -->
<script src="https://sokky-backend-school-project.onrender.com/search.js"></script>

<footer>
    <div class="footer-grid">
        <div>
            <h3>Social Media</h3>
            <a href="https://www.instagram.com/">Instagram</a>
            <a href="https://x.com/">Twitter</a>
            <a href="https://www.facebook.com/">Facebook</a>
        </div>
        <div>
            <h3>Top Routes</h3>
            <a href="#">Nairobi - Nakuru</a>
            <a href="#">Nairobi - Kisumu</a>
            <a href="#">Nairobi - Mombasa</a>
        </div>
    </div>
</footer>

</body>
</html>
